services:
  # --- Reverse Proxy (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: audia-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./config/generated/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

  # --- Front Door (LiteLLM) ---
  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.gateway
    container_name: audia-gateway
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable
    restart: unless-stopped

  # --- Path A: llama-cpp + llama-swap (ROCm/Vulkan/CUDA) ---
  backend-swappable:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.unified-backend
    container_name: audia-llama-cpp
    ports:
      - "41080:41080"
    volumes:
      - ./models:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
    # GPU reservations removed for CPU-only architecture testing
    restart: unless-stopped

  # --- Path B: vLLM (CUDA/ROCm High-Performance) ---
  backend-vllm:
    image: vllm/vllm-openai:latest
    container_name: audia-vllm
    ports:
      - "41090:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - ${MODEL_ROOT:-./models}:/root/.cache/huggingface:rw
    command: >
      --model /root/.cache/huggingface/${VLLM_MODEL:-qwen2.5-72b-instruct}
      --gpu-memory-utilization 0.85
    restart: unless-stopped

  # --- Hot-Reload Watcher ---
  watcher:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.gateway
    container_name: audia-watcher
    environment:
      - NGINX_INTERNAL=true
      - LLAMA_SWAP_INTERNAL=true
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["python3", "src/launcher/watcher.py"]
    depends_on:
      - gateway
    restart: unless-stopped
