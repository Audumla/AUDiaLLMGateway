services:
  # --- Reverse Proxy (always on) ---
  # nginx starts only after the gateway is healthy, which guarantees that
  # generate-configs has already written config/generated/nginx/nginx.conf.
  nginx:
    image: nginx:alpine
    container_name: audia-nginx
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./config/generated/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./config/generated/nginx:/app/static:ro,z
    depends_on:
      llm-gateway:
        condition: service_healthy
    restart: unless-stopped

  # --- API Gateway / Traffic Orchestrator (always on) ---
  llm-gateway:
    image: example/audia-llm-gateway-orchestrator:latest
    container_name: audia-gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - AUDIA_DOCKER=true
      - LLAMA_BACKEND=${LLAMA_BACKEND:-auto}
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VLLM_GPU_MEM=${VLLM_GPU_MEM:-1.0}
      - VLLM_MAX_LEN=${VLLM_MAX_LEN:-4096}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    volumes:
      # Mount only user-editable and generated subdirs — leaves config/project/ from image intact
      - ./config/local:/app/config/local:z
      - ./config/generated:/app/config/generated:z
    depends_on:
      - llm-server-llamacpp
    restart: unless-stopped

  # --- llama.cpp Inference Server (always on) ---
  # provision-runtime.sh auto-detects GPU at container start and downloads the
  # matching llama.cpp binary (CUDA, ROCm, Vulkan, or CPU). The host path mounted
  # at BACKEND_RUNTIME_ROOT is treated as a base directory; startup resolves
  # /app/runtime to a backend-specific subdirectory such as vulkan/ or rocm/.
  #
  # GPU device access is NOT requested here — this compose is for CPU or systems
  # where the Docker runtime already has GPU access configured (e.g. NVIDIA CDI).
  # For explicit GPU passthrough use the profiles in docker/examples/:
  #   NVIDIA: docker compose --project-directory . -f docker/examples/docker-compose.nvidia.yml up -d
  #   AMD:    docker compose --project-directory . -f docker/examples/docker-compose.amd.yml up -d
  llm-server-llamacpp:
    image: example/audia-llm-gateway-server:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
      # Override auto-detection: auto | cuda | rocm | vulkan | cpu
      - LLAMA_BACKEND=${LLAMA_BACKEND:-auto}
      # Optional: restrict Vulkan to specific ICD (e.g. /usr/share/vulkan/icd.d/radeon_icd.json for AMD)
      - VK_ICD_FILENAMES=${VK_ICD_FILENAMES:-}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - ${BACKEND_RUNTIME_ROOT:-./config/data/backend-runtime}:/app/runtime-root
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    privileged: true
    restart: unless-stopped

  # --- vLLM High-Performance Backend (optional — start with: docker compose --profile vllm up) ---
  # Uses the AUDia vLLM wrapper image so deployment stays image-only even when
  # config watching is enabled. Models are lazily loaded from the models
  # directory or downloaded from HuggingFace on first request.
  # Requires NVIDIA GPU with CUDA support.
  llm-server-vllm:
    image: ${VLLM_IMAGE:-example/audia-llm-gateway-vllm:latest}
    container_name: audia-vllm
    profiles:
      - vllm
      - full
    ports:
      - "${VLLM_PORT:-41090}:8000"
    environment:
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - VLLM_MOCK_MODE=${VLLM_MOCK_MODE:-false}
    volumes:
      - ${MODEL_HF_ROOT:-./models-hf}:/root/.cache/huggingface:rw
      - ./config/generated/vllm:/app/config/generated/vllm:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # --- Hot-Reload Watcher (optional) ---
  # Watches config/local/ for changes, regenerates configs, reloads nginx,
  # and restarts the gateway when LiteLLM auth/config changes.
  llm-config-watcher:
    image: example/audia-llm-gateway-orchestrator:latest
    container_name: audia-watcher
    profiles:
      - watcher
      - full
    environment:
      - AUDIA_DOCKER=true
      - LLAMA_BACKEND=${LLAMA_BACKEND:-auto}
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VLLM_GPU_MEM=${VLLM_GPU_MEM:-1.0}
      - VLLM_MAX_LEN=${VLLM_MAX_LEN:-4096}
    healthcheck:
      disable: true
    security_opt:
      - label=disable
    volumes:
      - ./config/local:/app/config/local:z
      - ./config/generated:/app/config/generated:z
      - /var/run/docker.sock:/var/run/docker.sock:z
    entrypoint: ["python3", "src/launcher/watcher.py"]
    depends_on:
      - llm-gateway
    restart: unless-stopped
