services:
  # ... (Nginx, Gateway, Watcher same as before) ...

  backend-swappable:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.unified-backend
    container_name: audia-llama-cpp
    environment:
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - backend-runtime:/app/runtime
    # All Hardware Passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    devices:
      - /dev/kfd:/dev/kfd       # AMD ROCm
      - /dev/dri:/dev/dri       # AMD/Vulkan
    privileged: true # Helps with heterogeneous device access on some distros
    restart: unless-stopped

volumes:
  backend-runtime:
