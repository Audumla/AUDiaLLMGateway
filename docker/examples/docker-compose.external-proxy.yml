# Example: External Proxy Setup
# Use this when you already run a reverse proxy (Traefik, nginx, Caddy) on the host.
# The gateway joins your existing proxy network instead of publishing a port.
#
# Run from the repo root (--project-directory keeps ./config and ./models relative to root):
#   docker compose --project-directory . -f docker/examples/docker-compose.external-proxy.yml up -d
#
# With vLLM added:
#   docker compose --project-directory . -f docker/examples/docker-compose.external-proxy.yml --profile vllm up -d
services:
  gateway:
    image: example/audia-llm-gateway-orchestrator:latest
    container_name: audia-gateway
    # No port mapping — traffic comes through the external proxy on the web-proxy network
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VLLM_GPU_MEM=${VLLM_GPU_MEM:-0.85}
      - VLLM_MAX_LEN=${VLLM_MAX_LEN:-4096}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable
    networks:
      - web-proxy
      - internal
    restart: unless-stopped

  backend-swappable:
    image: example/audia-llm-gateway-server:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_BACKEND=${LLAMA_BACKEND:-auto}
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - backend-runtime:/app/runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    networks:
      - internal
    restart: unless-stopped

  # vLLM backend — start with --profile vllm
  backend-vllm:
    image: ${VLLM_IMAGE:-example/audia-llm-gateway-vllm:latest}
    container_name: audia-vllm
    profiles:
      - vllm
    environment:
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - VLLM_MOCK_MODE=${VLLM_MOCK_MODE:-false}
    volumes:
      - ${MODEL_ROOT:-./models}:/root/.cache/huggingface:rw
      - ./config/generated/vllm:/app/config/generated/vllm:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - internal
    restart: unless-stopped

networks:
  web-proxy:
    external: true   # must already exist on the host
  internal:
    driver: bridge

volumes:
  backend-runtime:
