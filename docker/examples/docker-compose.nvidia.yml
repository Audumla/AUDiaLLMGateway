# Example: NVIDIA-Optimized Stack
# Use this if you only have NVIDIA GPUs
services:
  gateway:
    image: ${DOCKERHUB_USERNAME:-audiallmgateway}/audia-llm-gateway:latest
    container_name: audia-gateway
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable

  backend-swappable:
    image: ${DOCKERHUB_USERNAME:-audiallmgateway}/audia-llm-gateway-backend:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_BACKEND=cuda
    volumes:
      - ./models:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - backend-runtime:/app/runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  backend-runtime:
