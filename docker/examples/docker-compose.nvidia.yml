# Example: NVIDIA-Optimised Stack
# Use this when you only have NVIDIA GPUs.
# llama.cpp uses CUDA; vLLM is available as an optional profile.
#
# Run from the repo root (--project-directory keeps ./config and ./models relative to root):
#   docker compose --project-directory . -f docker/examples/docker-compose.nvidia.yml up -d
#
# With vLLM added:
#   docker compose --project-directory . -f docker/examples/docker-compose.nvidia.yml --profile vllm up -d
services:
  gateway:
    image: audumla/audia-llm-gateway-orchestrator:latest
    container_name: audia-gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VLLM_GPU_MEM=${VLLM_GPU_MEM:-0.85}
      - VLLM_MAX_LEN=${VLLM_MAX_LEN:-4096}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable
    restart: unless-stopped

  backend-swappable:
    image: audumla/audia-llm-gateway-server:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_BACKEND=cuda
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - backend-runtime:/app/runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # vLLM backend — start with --profile vllm
  backend-vllm:
    image: ${VLLM_IMAGE:-audumla/audia-llm-gateway-vllm:latest}
    container_name: audia-vllm
    profiles:
      - vllm
    ports:
      - "${VLLM_PORT:-41090}:8000"
    environment:
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - VLLM_MOCK_MODE=${VLLM_MOCK_MODE:-false}
    volumes:
      - ${MODEL_ROOT:-./models}:/root/.cache/huggingface:rw
      - ./config/generated/vllm:/app/config/generated/vllm:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  backend-runtime:
