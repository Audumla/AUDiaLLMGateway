# Example: CPU-Only Stack
# Use this for development, testing, or systems without a GPU.
# llama.cpp runs in CPU-only mode — slower but works anywhere.
# vLLM is not included here as it requires a GPU to function.
#
# Start:
#   docker compose -f docker/examples/docker-compose.cpu.yml up -d
services:
  gateway:
    image: example/audia-llm-gateway-orchestrator:latest
    container_name: audia-gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable
    restart: unless-stopped

  backend-swappable:
    image: example/audia-llm-gateway-server:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_BACKEND=cpu
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - backend-runtime:/app/runtime
    restart: unless-stopped

volumes:
  backend-runtime:
