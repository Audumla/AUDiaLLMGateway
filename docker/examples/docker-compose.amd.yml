# Example: AMD-Optimised Stack
# Use this when you only have AMD GPUs (ROCm or Vulkan).
# llama.cpp uses ROCm; vLLM uses the official ROCm image as an optional profile.
#
# Prerequisite: ROCm 5.6+ drivers installed, /dev/kfd accessible.
#
# Run from the repo root (--project-directory keeps ./config and ./models relative to root):
#   docker compose --project-directory . -f docker/examples/docker-compose.amd.yml up -d
#
# With vLLM added:
#   docker compose --project-directory . -f docker/examples/docker-compose.amd.yml --profile vllm up -d
services:
  gateway:
    image: audumla/audia-llm-gateway-orchestrator:latest
    container_name: audia-gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - AUDIA_ENABLE_VLLM=${AUDIA_ENABLE_VLLM:-false}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VLLM_GPU_MEM=${VLLM_GPU_MEM:-1.0}
      - VLLM_MAX_LEN=${VLLM_MAX_LEN:-4096}
    volumes:
      - ./config:/app/config
    depends_on:
      - backend-swappable
    restart: unless-stopped

  backend-swappable:
    image: audumla/audia-llm-gateway-server:latest
    container_name: audia-llama-cpp
    environment:
      - LLAMA_BACKEND=rocm
      - LLAMA_VERSION=${LLAMA_VERSION:-latest}
    volumes:
      - ${MODEL_ROOT:-./models}:/app/models:ro
      - ./config/generated/llama-swap:/app/config:ro
      - ${BACKEND_RUNTIME_ROOT:-./config/data/backend-runtime}:/app/runtime
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped

  # vLLM backend (ROCm) — start with --profile vllm
  backend-vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai-rocm:latest}
    container_name: audia-vllm
    profiles:
      - vllm
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-0.6B}
    ports:
      - "${VLLM_PORT:-41090}:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${MODEL_HF_ROOT:-./models-hf}:/root/.cache/huggingface:rw
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
