name: "audia-llm-gateway"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "Audumla <audumla@example.com>"
description: |
  Local-first LLM gateway using llama-swap and LiteLLM.
vendor: "Audumla"
homepage: "https://github.com/Audumla/AUDiaLLMGateway"
license: "MIT"

contents:
  - src: "./"
    dst: "/opt/AUDiaLLMGateway"
    # Exclude files that shouldn't be in the package
    # We will handle exclusions in the build workflow via find/rm before nfpm runs
  - src: "./scripts/audia-gateway.service"
    dst: "/etc/systemd/system/audia-gateway.service"

overrides:
  deb:
    depends:
      - python3 (>= 3.11)
      - curl
    scripts:
      postinstall: scripts/postinstall.sh
  rpm:
    depends:
      - python3 >= 3.11
      - curl
    scripts:
      postinstall: scripts/postinstall.sh
