name: "audia-llm-gateway"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "Audumla <audumla@example.com>"
description: |
  Local-first LLM gateway using llama-swap and LiteLLM.
vendor: "Audumla"
homepage: "https://github.com/Audumla/AUDiaLLMGateway"
license: "MIT"

contents:
  - src: "bootstrap/"
    dst: "/opt/AUDiaLLMGateway/bootstrap"
  - src: "config/project/"
    dst: "/opt/AUDiaLLMGateway/config/project"
  - src: "config/env.example"
    dst: "/opt/AUDiaLLMGateway/config/env.example"
  - src: "docs/"
    dst: "/opt/AUDiaLLMGateway/docs"
  - src: "install/"
    dst: "/opt/AUDiaLLMGateway/install"
  - src: "scripts/"
    dst: "/opt/AUDiaLLMGateway/scripts"
  - src: "specifications/"
    dst: "/opt/AUDiaLLMGateway/specifications"
  - src: "src/"
    dst: "/opt/AUDiaLLMGateway/src"
  - src: "README.md"
    dst: "/opt/AUDiaLLMGateway/README.md"
  - src: "requirements.txt"
    dst: "/opt/AUDiaLLMGateway/requirements.txt"
  - src: "CHANGELOG.md"
    dst: "/opt/AUDiaLLMGateway/CHANGELOG.md"

# Systemd configuration
systemd:
  - name: audia-gateway
    contents: |
      [Unit]
      Description=AUDia LLM Gateway
      After=network.target

      [Service]
      Type=simple
      User=root
      Group=root
      WorkingDirectory=/opt/AUDiaLLMGateway
      ExecStart=/opt/AUDiaLLMGateway/scripts/AUDiaLLMGateway.sh start
      ExecStop=/opt/AUDiaLLMGateway/scripts/AUDiaLLMGateway.sh stop
      Restart=always

      [Install]
      WantedBy=multi-user.target

overrides:
  deb:
    depends:
      - python3 (>= 3.11)
      - curl
    scripts:
      postinstall: scripts/postinstall.sh
  rpm:
    depends:
      - python3 >= 3.11
      - curl
    scripts:
      postinstall: scripts/postinstall.sh
