name: "audia-llm-gateway"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "ExampleOrg <example@example.com>"
description: |
  Local-first LLM gateway using llama-swap and LiteLLM.
vendor: "ExampleOrg"
homepage: "https://github.com/example/AUDiaLLMGateway"
license: "MIT"

contents:
  - src: "bootstrap/"
    dst: "/opt/AUDiaLLMGateway/bootstrap"
  - src: "config/project/"
    dst: "/opt/AUDiaLLMGateway/config/project"
  - src: "config/env.example"
    dst: "/opt/AUDiaLLMGateway/config/env.example"
  - src: "specifications/docs/"
    dst: "/opt/AUDiaLLMGateway/docs"
  - src: "install/"
    dst: "/opt/AUDiaLLMGateway/install"
  - src: "scripts/"
    dst: "/opt/AUDiaLLMGateway/scripts"
  - src: "specifications/"
    dst: "/opt/AUDiaLLMGateway/specifications"
  - src: "src/"
    dst: "/opt/AUDiaLLMGateway/src"
  - src: "README.md"
    dst: "/opt/AUDiaLLMGateway/README.md"
  - src: "requirements.txt"
    dst: "/opt/AUDiaLLMGateway/requirements.txt"
  - src: "CHANGELOG.md"
    dst: "/opt/AUDiaLLMGateway/CHANGELOG.md"
  - src: "changelog/"
    dst: "/opt/AUDiaLLMGateway/changelog"
  - src: "tests/"
    dst: "/opt/AUDiaLLMGateway/tests"
  - src: "scripts/audia-gateway.service"
    dst: "/etc/systemd/system/audia-gateway.service"

overrides:
  deb:
    depends:
      - python3 (>= 3.11)
      - curl
    scripts:
      postinstall: scripts/postinstall.sh
  rpm:
    depends:
      - python3 >= 3.11
      - curl
    scripts:
      postinstall: scripts/postinstall.sh

