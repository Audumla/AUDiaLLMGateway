name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Optional exact release version (e.g. 1.2.3)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          fail_on_unmatched_files: false

  package:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build packages
        run: |
          rm -rf .git .github .vscode .agent_runner .pytest_cache .venv test-work
          find . -name "__pycache__" -type d -exec rm -rf {} +
          VERSION=${{ needs.release.outputs.tag_name }}
          VERSION=${VERSION#v}
          export VERSION
          nfpm pkg --packager deb --target audia-llm-gateway.deb
          nfpm pkg --packager rpm --target audia-llm-gateway.rpm

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: |
            *.deb
            *.rpm

  docker-server-base:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: example/audia-llm-gateway-server-base
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}

      - name: Build and push Server Base Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.backend-base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server-base
          cache-to: type=gha,mode=max,scope=server-base

  docker-server:
    runs-on: ubuntu-latest
    needs:
      - release
      - docker-server-base
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: example/audia-llm-gateway-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}

      - name: Build and push Server Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.unified-backend
          build-args: |
            BACKEND_BASE_IMAGE=example/audia-llm-gateway-server-base:${{ needs.release.outputs.tag_name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  docker-orchestrator-base:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: example/audia-llm-gateway-orchestrator-base
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}

      - name: Build and push Orchestrator Base Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.gateway-base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=orchestrator-base
          cache-to: type=gha,mode=max,scope=orchestrator-base

  docker-orchestrator:
    runs-on: ubuntu-latest
    needs:
      - release
      - docker-orchestrator-base
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: example/audia-llm-gateway-orchestrator
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.tag_name }}

      - name: Build and push Orchestrator Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.gateway
          build-args: |
            GATEWAY_BASE_IMAGE=example/audia-llm-gateway-orchestrator-base:${{ needs.release.outputs.tag_name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator
