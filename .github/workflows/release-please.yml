name: Release Please

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Optional exact release version (e.g. 1.2.3)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [tumbleweed, ubuntu, debian, fedora, rocky]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run smoke test (${{ matrix.distro }})
        run: |
          docker build -f tests/docker/Dockerfile.${{ matrix.distro }} \
            -t audia-smoke-${{ matrix.distro }} .
          docker run --rm audia-smoke-${{ matrix.distro }}

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          fail_on_unmatched_files: false

  package:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build packages
        run: |
          # Surgeons cleanup: remove metadata and local dev artifacts
          rm -rf .git .github .vscode .agent_runner .pytest_cache .venv test-work
          find . -name "__pycache__" -type d -exec rm -rf {} +

          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=${{ needs.release.outputs.tag_name }}
          VERSION=${VERSION#v}
          export VERSION

          # Linux packages
          nfpm pkg --packager deb --target audia-llm-gateway.deb
          nfpm pkg --packager rpm --target audia-llm-gateway.rpm


      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: |
            *.deb
            *.rpm
