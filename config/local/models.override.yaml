model_profiles:
  qwen27_fast:
    deployments:
      llamacpp_vulkan:
        label: local/qwen27_fast
        template: llamacpp_vulkan_split_validation
        llama_swap_model: qwen3.5-27b-(96k-Q6)
        backend_model_name: qwen3.5-27b-(96k-Q6)
  qwen122_smart:
    deployments:
      llamacpp_vulkan:
        label: local/qwen122_smart
        template: llamacpp_vulkan_balanced_validation
        llama_swap_model: qwen3.5-122b
        backend_model_name: qwen3.5-122b
  qwen4b_vision:
    deployments:
      llamacpp_vulkan:
        label: local/qwen4b_vision
        template: llamacpp_vulkan_single_validation
        llama_swap_model: qwen3-5-4b-ud-q5-k-xl-vision
        backend_model_name: qwen3-5-4b-ud-q5-k-xl-vision
  qwen4b_validation:
    deployments:
      llamacpp_vulkan:
        label: local/qwen4b_validation_vulkan
        template: llamacpp_vulkan_single_validation
        llama_swap_model: qwen3-5-4b-q8-validation-vulkan
        backend_model_name: qwen3-5-4b-q8-validation-vulkan
      llamacpp_rocm:
        label: local/qwen4b_validation_rocm
        template: llamacpp_rocm_single_validation
        llama_swap_model: qwen3-5-4b-q8-validation-rocm
        backend_model_name: qwen3-5-4b-q8-validation-rocm
      llamacpp_cpu:
        label: local/qwen4b_validation_cpu
        template: llamacpp_cpu_validation
        llama_swap_model: qwen3-5-4b-q8-validation-cpu
        backend_model_name: qwen3-5-4b-q8-validation-cpu
  qwen2b_validation:
    deployments:
      llamacpp_vulkan:
        label: local/qwen2b_validation_vulkan
        template: llamacpp_vulkan_single_validation
        llama_swap_model: qwen3-5-2b-q4-validation-vulkan
        backend_model_name: qwen3-5-2b-q4-validation-vulkan
      llamacpp_rocm:
        label: local/qwen2b_validation_rocm
        template: llamacpp_rocm_single_validation
        llama_swap_model: qwen3-5-2b-q4-validation-rocm
        backend_model_name: qwen3-5-2b-q4-validation-rocm
      llamacpp_cpu:
        label: local/qwen2b_validation_cpu
        template: llamacpp_cpu_validation
        llama_swap_model: qwen3-5-2b-q4-validation-cpu
        backend_model_name: qwen3-5-2b-q4-validation-cpu
  ministral3b_vision:
    deployments:
      llamacpp_vulkan:
        label: local/ministral3b_vision
        template: llamacpp_vulkan_single_validation
        llama_swap_model: ministral3b-vision
        backend_model_name: ministral3b-vision
  vllm_default:
    deployments:
      vllm_single_gpu:
        label: local/vllm_default
        template: vllm_rocm_single_validation
        backend_model_name: Qwen2.5-0.5B-Instruct
  vllm_qwen72b_distributed:
    deployments:
      vllm_distributed:
        enabled: false
        label: local/vllm_qwen72b_distributed
        template: vllm_rocm_tensor_parallel_2_validation
        backend_model_name: Qwen2.5-72B-Instruct
        vllm:
          visible_devices: "0,1"
  tiny_qwen25_test:
    deployments:
      llamacpp_rocm:
        label: local/tiny_qwen25_test
        template: llamacpp_rocm_single_validation
        llama_swap_model: tiny-qwen25-test
        backend_model_name: tiny-qwen25-test
