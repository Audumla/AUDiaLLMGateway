version: 1
defaults:
  # Smart caching: Only provision on startup if:
  # 1. Binary doesn't exist yet
  # 2. Version has changed
  # 3. Binary is corrupted/invalid
  # Skips rebuild if cached binary matches version
  always: false

# Backend variant overrides for local environment
# All variants now use prebuilt binaries (no custom builds)
variants:
  # Primary backends: enabled (use prebuilt ggml-org releases)
  cpu:
    enabled: true

  cuda:
    enabled: true

  rocm:
    enabled: true

  vulkan:
    enabled: true

  # ROCm GFX variants: enabled (use prebuilt releases)
  # These previously failed due to build issues - now use prebuilt
  rocm-gfx1100-prebuilt:
    enabled: true  # ✅ Enabled (uses prebuilt)

  rocm-gfx1030-prebuilt:
    enabled: true  # ✅ Enabled (uses prebuilt)

  # Custom builds: disabled by default
  # Only enable if prebuilt doesn't work for your use case
  # Smart cache: builds only if version changes (not every restart)
  rocm-gfx1100-official-custom:
    enabled: false  # Disabled: prebuilt is preferred

  rocm-gfx1030-official-custom:
    enabled: false  # Disabled: prebuilt is preferred

