worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;

    upstream litellm_upstream {
        server 127.0.0.1:4000;
        keepalive 16;
    }

    upstream llamaswap_upstream {
        server 127.0.0.1:41080;
        keepalive 16;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen       8080;
        server_name  localhost;

        client_max_body_size 100m;

        # Main OpenAI-compatible endpoint for tools and agents.
        location /v1/ {
            proxy_pass http://litellm_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # LiteLLM health and admin-facing paths kept under an explicit prefix.
        location /litellm/ {
            rewrite ^/litellm/(.*)$ /$1 break;
            proxy_pass http://litellm_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Full llama-swap surface, namespaced to avoid collisions with LiteLLM /v1/*.
        location /llamaswap/ {
            rewrite ^/llamaswap/(.*)$ /$1 break;
            proxy_pass http://llamaswap_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Explicit SSE/log streaming path for llama-swap.
        location /llamaswap/logs/stream {
            rewrite ^/llamaswap/(.*)$ /$1 break;
            proxy_pass http://llamaswap_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            chunked_transfer_encoding off;
        }

        # Optional direct health shortcuts.
        location = /health {
            proxy_pass http://litellm_upstream/health;
        }

        location = /llamaswap-health {
            proxy_pass http://llamaswap_upstream/health;
        }
    }
}

