version: 1

frameworks:
  llama_cpp:
    type: llama_cpp
    supports:
      - llama-swap
      - litellm
    llama_swap:
      executable_macro: llama-server
      server_args_macro: server-args
      model_path_macro: model-path
      mmproj_path_macro: mmproj-path
      context_macro_name_template: context-{alias}-args
      context_arg_template: --ctx-size {tokens}
  vllm:
    type: vllm
    supports:
      - litellm

presets:
  contexts:
    32k:
      tokens: 32768
    64k:
      tokens: 65536
    96k:
      tokens: 98304
    256k:
      tokens: 262144
  gpu_profiles:
    gpu1:
      llama_swap_macro: gpu1-args
      llama_cpp_options:
        device: Vulkan0
        split_mode: none
        parallel: 1
        gpu_layers: all
    gpu2:
      llama_swap_macro: gpu2-args
      llama_cpp_options:
        device: Vulkan1
        split_mode: none
        parallel: 1
        gpu_layers: all
    gpu_equal:
      llama_swap_macro: gpu-equal-args
      llama_cpp_options:
        device:
          - Vulkan0
          - Vulkan1
        split_mode: layer
        tensor_split:
          - 1
          - 1
        parallel: 1
        gpu_layers: all
    gpu_balanced:
      llama_swap_macro: gpu-balanced-args
      llama_cpp_options:
        device:
          - Vulkan0
          - Vulkan1
        split_mode: row
        tensor_split:
          - 1
          - 1
        gpu_layers: 99
        parallel: 1
    gpu_balanced3:
      llama_swap_macro: gpu-balanced3-args
      llama_cpp_options:
        device:
          - Vulkan0
          - Vulkan1
          - Vulkan2
        split_mode: layer
        tensor_split:
          - 24
          - 16
          - 24
        parallel: 1
        gpu_layers: all
  runtime_profiles:
    jinja:
      llama_swap_macro: jinja-args
      llama_cpp_options:
        jinja: true
    nothink:
      llama_swap_macro: nothink-args
      llama_cpp_options:
        reasoning_budget: 0
        reasoning_format: none
    qwen_nothink:
      llama_swap_macro: qwen-nothink-args
      llama_cpp_options:
        reasoning_budget: 0
        reasoning_format: none
        chat_template_kwargs:
          enable_thinking: false
    coder:
      llama_swap_macro: coder_args
      llama_cpp_options:
        jinja: true
        flash_attn: on
        temp: 0
        top_p: 0.9
        top_k: 20
        min_p: 0.0
        presence_penalty: 0.0
        repeat_penalty: 1.0
        seed: 42
        frequency_penalty: 0
        mirostat: 0
        dynatemp_range: 0
        cache_reuse: 128
    vision:
      llama_swap_macro: vision-args
      llama_cpp_options:
        image_min_tokens: 1024
    batch:
      llama_swap_macro: batch-args
      llama_cpp_options:
        threads: 8
        threads_batch: 24
        batch_size: 512
        ubatch_size: 512
        flash_attn: on
    cache_q8:
      llama_swap_macro: cache-q8-args
      llama_cpp_options:
        cache_type_k: q8_0
        cache_type_v: q8_0
    flash_off:
      llama_swap_macro: flash-off-args
      llama_cpp_options:
        flash_attn: off
    interpret:
      llama_swap_macro: interpret-args
      llama_cpp_options:
        temp: 0
        top_k: 1
        top_p: 1
        min_p: 0
        seed: 42
        repeat_penalty: 1.0
        presence_penalty: 0
        frequency_penalty: 0
        mirostat: 0
        dynatemp_range: 0
        cache_reuse: 128

model_profiles:
  qwen27_fast:
    family: qwen3.5
    purpose: Fast coding, repo work, and tool-heavy local workflows
    defaults:
      context_preset: 96k
      gpu_preset: gpu1
      runtime_presets:
        - jinja
        - nothink
        - coder
    artifacts:
      model_file: Qwen3.5-27B/Qwen3.5-27B-Q6_K.gguf
      revision: main
      source_page_url: https://huggingface.co/mradermacher/Qwen3.5-27B-GGUF
      model_filename: Qwen3.5-27B.Q6_K.gguf
      model_url: https://huggingface.co/mradermacher/Qwen3.5-27B-GGUF/resolve/main/Qwen3.5-27B.Q6_K.gguf?download=true
    deployments:
      llamacpp_vulkan:
        framework: llama_cpp
        transport: llama-swap
        llama_swap_model: qwen3.5-27b-(96k-Q6)
        backend_model_name: qwen3.5-27b-(96k-Q6)

  qwen122_smart:
    family: qwen3.5
    purpose: Harder reasoning and larger-context local work
    defaults:
      context_preset: 32k
      gpu_preset: gpu_balanced3
      concurrency_limit: 1
      runtime_presets:
        - jinja
        - batch
        - cache_q8
    artifacts:
      model_file: qwen3.5-122B-a10b/Qwen3.5-122B-A10B-UD-IQ4_XS-00001-of-00003.gguf
      revision: main
      source_page_url: https://huggingface.co/unsloth/Qwen3.5-122B-A10B-GGUF/tree/main/UD-IQ4_XS
      model_filename: Qwen3.5-122B-A10B-UD-IQ4_XS-00001-of-00003.gguf
      model_url: https://huggingface.co/unsloth/Qwen3.5-122B-A10B-GGUF/resolve/main/UD-IQ4_XS/Qwen3.5-122B-A10B-UD-IQ4_XS-00001-of-00003.gguf?download=true
      additional_model_urls:
        - https://huggingface.co/unsloth/Qwen3.5-122B-A10B-GGUF/resolve/main/UD-IQ4_XS/Qwen3.5-122B-A10B-UD-IQ4_XS-00002-of-00003.gguf?download=true
        - https://huggingface.co/unsloth/Qwen3.5-122B-A10B-GGUF/resolve/main/UD-IQ4_XS/Qwen3.5-122B-A10B-UD-IQ4_XS-00003-of-00003.gguf?download=true
    deployments:
      llamacpp_vulkan:
        framework: llama_cpp
        transport: llama-swap
        llama_swap_model: qwen3.5-122b
        backend_model_name: qwen3.5-122b

  qwen4b_vision:
    family: qwen3.5
    purpose: Small vision-capable model exposed through llama-swap
    defaults:
      context_preset: 64k
      gpu_preset: gpu1
      concurrency_limit: 1
      runtime_presets:
        - vision
        - nothink
    artifacts:
      model_file: Qwen3.5-4B/Qwen3.5-4B-UD-Q5_K_XL.gguf
      mmproj_file: Qwen3.5-4B/mmproj-F16.gguf
      revision: main
      source_page_url: https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/tree/main
      model_filename: Qwen3.5-4B-UD-Q5_K_XL.gguf
      model_url: https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/resolve/main/Qwen3.5-4B-UD-Q5_K_XL.gguf?download=true
      mmproj_filename: mmproj-F16.gguf
      mmproj_url: https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/resolve/main/mmproj-F16.gguf?download=true
    deployments:
      llamacpp_vulkan:
        framework: llama_cpp
        transport: llama-swap
        llama_swap_model: qwen3-5-4b-ud-q5-k-xl-vision
        backend_model_name: qwen3-5-4b-ud-q5-k-xl-vision

  ministral3b_vision:
    family: ministral
    purpose: Small 3B vision-capable model for quick tests and lightweight tasks
    defaults:
      context_preset: 64k
      gpu_preset: gpu1
      concurrency_limit: 1
      runtime_presets:
        - vision
        - nothink
    artifacts:
      model_file: Ministral-3-3B/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
      mmproj_file: Ministral-3-3B/mmproj-Ministral-3-3B-Instruct-2512-F16.gguf
      revision: main
      source_page_url: https://huggingface.co/mistralai/Ministral-3B-Instruct
      model_filename: Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
      model_url: https://huggingface.co/bartowski/Ministral-3B-Instruct-GGUF/resolve/main/Ministral-3B-Instruct-Q4_K_M.gguf?download=true
      mmproj_filename: mmproj-Ministral-3-3B-Instruct-2512-F16.gguf
      mmproj_url: https://huggingface.co/second-state/Ministral-3B-Instruct-GGUF/resolve/main/Ministral-3B-Instruct-Q4_K_M-mmproj-f16.gguf?download=true
    deployments:
      llamacpp_vulkan:
        framework: llama_cpp
        transport: llama-swap
        llama_swap_model: ministral3b-vision
        backend_model_name: ministral3b-vision

  vllm_default:
    family: qwen2.5
    purpose: Persistent high-throughput model served directly by the optional vLLM backend
    defaults:
      context_preset: 32k
    artifacts:
      revision: main
      source_page_url: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct
      model_filename: ${VLLM_MODEL}
      model_url: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct
    deployments:
      vllm_primary:
        framework: vllm
        transport: direct
        backend_model_name: ${VLLM_MODEL}

exposures:
  - stable_name: local/qwen27_fast
    model_profile: qwen27_fast
    deployment: llamacpp_vulkan
    mode: chat

  - stable_name: local/qwen122_smart
    model_profile: qwen122_smart
    deployment: llamacpp_vulkan
    mode: chat

  - stable_name: local/qwen4b_vision
    model_profile: qwen4b_vision
    deployment: llamacpp_vulkan
    mode: chat

  - stable_name: local/ministral3b_vision
    model_profile: ministral3b_vision
    deployment: llamacpp_vulkan
    mode: chat

  - stable_name: local/vllm_default
    model_profile: vllm_default
    deployment: vllm_primary
    mode: chat

load_groups:
  coding_active:
    purpose: Keep the fast coding model loaded during agent and repo workflows
    activities:
      - coding
      - agent
      - repo
    persistent: true
    swap: false
    exclusive: false
    members:
      - model_profile: qwen27_fast
        deployment: llamacpp_vulkan

  reasoning_active:
    purpose: Prefer the larger reasoning model when deeper analysis is the active task
    activities:
      - reasoning
      - analysis
    persistent: false
    swap: true
    exclusive: false
    members:
      - model_profile: qwen122_smart
        deployment: llamacpp_vulkan

  vision_active:
    purpose: Keep the small vision-capable model available for image tasks
    activities:
      - vision
      - multimodal
    persistent: false
    swap: true
    exclusive: true
    members:
      - model_profile: qwen4b_vision
        deployment: llamacpp_vulkan

  ministral_active:
    purpose: Lightweight vision model for quick test inference and small tasks
    activities:
      - vision
      - test
    persistent: false
    swap: true
    exclusive: false
    members:
      - model_profile: ministral3b_vision
        deployment: llamacpp_vulkan
