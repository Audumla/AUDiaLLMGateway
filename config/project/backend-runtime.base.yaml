version: 1
defaults:
  # PRIMARY: Use prebuilt binaries from GitHub releases (fast, reliable)
  source_type: github_release
  repo_owner: ggml-org
  repo_name: llama.cpp
  version: ${LLAMA_VERSION}
  enabled: true
  # SMART CACHING: Only build if version changes
  always: false
  base_backends:
    - cpu
    - cuda
    - rocm
    - vulkan

sources:
  # === PREBUILT RELEASES (Primary - Fast & Reliable) ===
  ggml-release:
    source_type: github_release
    repo_owner: ggml-org
    repo_name: llama.cpp

  # === ALTERNATIVE GIT SOURCES ===
  ggml-git:
    source_type: git
    git_url: https://github.com/ggml-org/llama.cpp.git
    git_ref: ${LLAMA_VERSION:-master}

  turboquant-git:
    source_type: git
    git_url: https://github.com/TheTom/llama-cpp-turboquant.git
    git_ref: ${TURBOQUANT_VERSION:-master}
    version: ${TURBOQUANT_VERSION:-master}

  rocm-official-fixed:
    source_type: git
    git_url: https://github.com/ROCm/llama.cpp.git
    git_ref: ${ROCM_OFFICIAL_VERSION:-master}
    version: ${ROCM_OFFICIAL_VERSION:-master}

  rocm-official-preview:
    source_type: git
    git_url: https://github.com/ROCm/llama.cpp.git
    git_ref: ${ROCM_LLAMA_CPP_PREVIEW_REF}

builds:
  # === BUILD STRATEGIES ===
  rocm-gfx:
    backend: rocm
    # Convert comma-separated AUDIA_DETECTED_GFX to semicolon-separated for CMake
    configure_command: >-
      cmake -S . -B build -DLLAMA_BUILD_SERVER=ON -DGGML_HIP=ON
      -DAMDGPU_TARGETS="$(echo ${AUDIA_DETECTED_GFX:-gfx1030;gfx1100} | sed 's/,/;/g')"
      -DCMAKE_HIP_ARCHITECTURES="$(echo ${AUDIA_DETECTED_GFX:-gfx1030;gfx1100} | sed 's/,/;/g')"
      -DCMAKE_BUILD_TYPE=Release
    build_command: cmake --build build --config Release --parallel
    binary_glob: build/bin/llama-server
    library_glob: build/bin/*.so*
    apt_packages:
      - git
      - cmake
      - build-essential
      - pkg-config

  vulkan-standard:
    backend: vulkan
    configure_command: cmake -S . -B build -DLLAMA_BUILD_SERVER=ON -DGGML_VULKAN=ON -DCMAKE_BUILD_TYPE=Release
    build_command: cmake --build build --config Release --parallel
    binary_glob: build/bin/llama-server
    library_glob: build/bin/*.so*
    apt_packages:
      - git
      - cmake
      - build-essential
      - pkg-config

variants:
  # === PRIMARY BACKENDS (Source-First Native) ===
  rocm:
    source: ggml-git
    build: rocm-gfx
    macro: llama-server-rocm-native
    runtime_subdir: rocm/native
    enabled: true

  vulkan:
    source: ggml-git
    build: vulkan-standard
    macro: llama-server-vulkan-native
    runtime_subdir: vulkan/native
    enabled: true

  # === OPTIMIZED FORKS (Source-First Native) ===
  rocm-turboquant:
    source: turboquant-git
    build: rocm-gfx
    macro: llama-server-rocm-turboquant-native
    runtime_subdir: rocm/turboquant/native
    enabled: true

  vulkan-turboquant:
    source: turboquant-git
    build: vulkan-standard
    macro: llama-server-vulkan-turboquant-native
    runtime_subdir: vulkan/turboquant/native
    enabled: true

  rocm-official:
    source: rocm-official-fixed
    build: rocm-gfx
    macro: llama-server-rocm-official-native
    runtime_subdir: rocm/official/native
    enabled: true

  # === PREBUILT FALLBACKS ===
  cpu:
    source: ggml-release
    backend: cpu
    macro: llama-server-cpu
    runtime_subdir: cpu
    asset_pattern: ubuntu-x64\.(tar\.gz|zip)$
    enabled: true

  cuda:
    source: ggml-release
    backend: cuda
    macro: llama-server-cuda
    runtime_subdir: cuda
    asset_pattern: ubuntu-x64\.(tar\.gz|zip)$
    enabled: true

  rocm-prebuilt:
    source: ggml-release
    backend: rocm
    macro: llama-server-rocm
    runtime_subdir: rocm
    asset_pattern: ubuntu-rocm.*x64\.(tar\.gz|zip)$
    enabled: true

  vulkan-prebuilt:
    source: ggml-release
    backend: vulkan
    macro: llama-server-vulkan
    runtime_subdir: vulkan
    asset_pattern: ubuntu-vulkan.*x64\.(tar\.gz|zip)$
    enabled: true
