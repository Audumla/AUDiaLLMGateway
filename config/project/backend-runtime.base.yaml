version: 1
defaults:
  # PRIMARY: Use prebuilt binaries from GitHub releases (fast, reliable)
  source_type: github_release
  repo_owner: ggml-org
  repo_name: llama.cpp
  version: ${LLAMA_VERSION}
  enabled: true
  # SMART CACHING: Only build if version changes
  # always: false means: don't rebuild on every start
  # Rebuild triggers: version change detected, binary missing, or version mismatch
  always: false
  base_backends:
    - cpu
    - cuda
    - rocm
    - vulkan

profiles:
  # === PREBUILT RELEASES (Primary - Fast & Reliable) ===
  # These download pre-compiled binaries from GitHub releases
  # No compilation needed - instant availability

  source-ggml-release:
    # Primary source for all standard backends
    source_type: github_release
    repo_owner: ggml-org
    repo_name: llama.cpp
    # Auto-selects version: llama-b*-bin-ubuntu-{backend}-x64.tar.gz

  # === ALTERNATIVE GIT SOURCES (Fallback - Only if needed) ===
  # These are available if custom builds are needed
  # Note: Only rebuild when version changes (always: false in defaults)

  source-ggml-git:
    source_type: git
    git_url: https://github.com/ggml-org/llama.cpp.git
    git_ref: master
    # Fallback: compile from source if prebuilt unavailable

  source-rocm-official-fixed:
    # FIXED: Changed from 'main' (doesn't exist) to 'master'
    source_type: git
    git_url: https://github.com/ROCm/llama.cpp.git
    git_ref: master
    # Only builds if explicitly enabled + version changed
    # Smart cache: skips rebuild if binary exists and matches version

  source-rocm-official-preview:
    # FIXED: Using explicit preview ref with smart caching
    source_type: git
    git_url: https://github.com/ROCm/llama.cpp.git
    git_ref: ${ROCM_LLAMA_CPP_PREVIEW_REF}
    # Only builds if explicitly enabled + version changed

  # === BUILD CONFIGURATION ===
  # Only executes if: (1) explicitly enabled, (2) no cached binary, or (3) version changed

  build-rocm-gfx:
    backend: rocm
    configure_command: cmake -S . -B build -DLLAMA_BUILD_SERVER=ON -DGGML_HIPBLAS=ON -DAMDGPU_TARGETS=gfx1030;gfx1100 -DCMAKE_HIP_ARCHITECTURES=gfx1030;gfx1100 -DCMAKE_BUILD_TYPE=Release
    build_command: cmake --build build --config Release --parallel
    binary_glob: build/bin/llama-server
    library_glob: build/bin/*.so*
    apt_packages:
      - git
      - cmake
      - build-essential
      - pkg-config
variants:
  # === PRIMARY BACKENDS (Prebuilt) ===
  # These use ggml-org prebuilt binaries
  # Fast, reliable, always available
  # Smart caching: only re-download if version changes

  cpu:
    backend: cpu
    macro: llama-server-cpu
    runtime_subdir: cpu
    asset_pattern: ubuntu-x64\.(tar\.gz|zip)$
    enabled: true

  cuda:
    backend: cuda
    macro: llama-server-cuda
    runtime_subdir: cuda
    asset_pattern: ubuntu-x64\.(tar\.gz|zip)$
    enabled: true

  rocm:
    backend: rocm
    macro: llama-server-rocm
    runtime_subdir: rocm
    asset_pattern: ubuntu-rocm.*x64\.(tar\.gz|zip)$
    enabled: true

  vulkan:
    backend: vulkan
    macro: llama-server-vulkan
    runtime_subdir: vulkan
    asset_pattern: ubuntu-vulkan.*x64\.(tar\.gz|zip)$
    enabled: true

  # === SPECIALIZED ROCm VARIANTS (Now Using Prebuilt) ===
  # These are enabled using ggml-org prebuilt binaries
  # Uses smart caching: only downloads when version changes
  # Fallback to Git builds available if needed (disabled by default)

  rocm-gfx1100-prebuilt:
    # Uses prebuilt ggml-org release (fast, reliable)
    profiles:
      - source-ggml-release  # Prebuilt releases
    backend: rocm
    macro: llama-server-rocm-gfx1100
    runtime_subdir: rocm/gfx1100
    asset_pattern: ubuntu-rocm.*x64\.(tar\.gz|zip)$
    enabled: true  # ✅ ENABLED - Uses prebuilt

  rocm-gfx1100-official-custom:
    # Custom build from ROCm official (fallback only)
    profiles:
      - source-rocm-official-fixed  # Fixed: uses 'master' instead of 'main'
      - build-rocm-gfx
    macro: llama-server-rocm-gfx1100-official
    runtime_subdir: rocm/gfx1100/official
    enabled: false  # Disabled: use prebuilt instead
    # To enable: Set enabled: true
    # Smart cache: builds only if version changes (not every restart)

  rocm-gfx1100-official-preview:
    # Uses ggml-org prebuilt with preview ref detection
    profiles:
      - source-ggml-release  # Prebuilt releases
    backend: rocm
    macro: llama-server-rocm-gfx1100-preview
    runtime_subdir: rocm/gfx1100/preview
    asset_pattern: ubuntu-rocm.*x64\.(tar\.gz|zip)$
    enabled: false  # Optional: prebuilt available
    # Note: ROCM_LLAMA_CPP_PREVIEW_REF only applies to custom Git builds

  rocm-gfx1030-prebuilt:
    # Uses prebuilt ggml-org release (fast, reliable)
    profiles:
      - source-ggml-release  # Prebuilt releases
    backend: rocm
    macro: llama-server-rocm-gfx1030
    runtime_subdir: rocm/gfx1030
    asset_pattern: ubuntu-rocm.*x64\.(tar\.gz|zip)$
    enabled: true  # ✅ ENABLED - Uses prebuilt

  rocm-gfx1030-official-custom:
    # Custom build from ROCm official (fallback only)
    profiles:
      - source-rocm-official-fixed  # Fixed: uses 'master' instead of 'main'
      - build-rocm-gfx
    macro: llama-server-rocm-gfx1030-official
    runtime_subdir: rocm/gfx1030/official
    enabled: false  # Disabled: use prebuilt instead
    # To enable: Set enabled: true
    # Smart cache: builds only if version changes (not every restart)
