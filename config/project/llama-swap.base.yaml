# Base llama-swap substrate for generated runtime config.
# The shared model catalog in config/project/models.base.yaml is the only
# project model-definition source. Generated output owns models and groups.

healthCheckTimeout: 300
logLevel: info
startPort: 41000

macros:
  llama-server-rocm: "C:\\development\\tools\\llama-bin-amd\\llama-server.exe"
  llama-server: "C:\\development\\tools\\llamacpp\\llama-server.exe"
  model-path: "--model C:\\development\\llm-models"
  mmproj-path: "--mmproj C:\\development\\llm-models"

models: {}
groups: {}
