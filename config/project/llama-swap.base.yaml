# Base llama-swap substrate for generated runtime config.
# Model definitions come from the merged catalog:
#   config/project/models.base.yaml (scaffold/shared defaults)
#   config/local/models.override.yaml (install-local definitions)
# Generated output owns models and groups.

healthCheckTimeout: 300
logLevel: warn
startPort: 41000

macros:
  # Backend binaries live in dedicated runtime directories:
  #   /app/runtime-root/cpu/bin/llama-server-cpu
  #   /app/runtime-root/cuda/bin/llama-server-cuda
  #   /app/runtime-root/rocm/bin/llama-server-rocm
  #   /app/runtime-root/vulkan/bin/llama-server-vulkan
  #
  # Docker-specific backend wrappers are synthesized from the backend-runtime
  # catalog when AUDIA_DOCKER=true. Keep config/local/llama-swap.override.yaml
  # for machine-local customizations only, and avoid hardcoding platform-specific
  # env wrappers there.
  #
  # Then per model in models.override.yaml set:
  #   executable_macro: llama-server-rocm   # or -vulkan, -cuda, -cpu
  llama-server: "llama-server-cpu"
  llama-server-cpu: "llama-server-cpu"
  llama-server-rocm: "llama-server-rocm"
  llama-server-cuda: "llama-server-cuda"
  llama-server-vulkan: "llama-server-vulkan"
  model-path: "--model models"
  mmproj-path: "--mmproj models"

models: {}
groups: {}
