# Base llama-swap substrate for generated runtime config.
# The shared model catalog in config/project/models.base.yaml is the only
# project model-definition source. Generated output owns models and groups.

healthCheckTimeout: 300
logLevel: info
startPort: 41000

macros:
  llama-server-rocm: "llama-server"
  llama-server: "llama-server"
  model-path: "--model models"
  mmproj-path: "--mmproj models"

models: {}
groups: {}
