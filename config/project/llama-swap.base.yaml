# Auto-generated llama-swap config for local llama.cpp models
# Based on config-vulkan template
# Updated on 2026-03-08
# Rules:
# - 32k context, parallel 1, concurrencyLimit 1
# - no aliases
# - base profile mode: small <=18GB -> XTX only, large >18GB -> split over 2 GPUs
# - add -xtx variants only for large models (so profiles are not duplicates)

healthCheckTimeout: 300
logLevel: info
startPort: 41000

macros:
  llama-server-rocm: "C:\\development\\tools\\llama-bin-amd\\llama-server.exe"
  llama-server: "C:\\development\\tools\\llamacpp\\llama-server.exe"
  model-path: "--model C:\\development\\llm-models"
  mmproj-path: "--mmproj C:\\development\\llm-models"
  context-4k-args: --ctx-size 4096
  context-8k-args: --ctx-size 8192
  context-16k-args: --ctx-size 16384
  context-24k-args: --ctx-size 24576
  context-32k-args: --ctx-size 32768
  context-48k-args: --ctx-size 49152
  context-64k-args: --ctx-size 65536
  context-96k-args: --ctx-size 98304
  context-128k-args: --ctx-size 131072
  context-192k-args: --ctx-size 196608
  context-256k-args: --ctx-size 262144
  server-args: >
    --port ${PORT}
    --host 127.0.0.1
  cache-q8-args: >
    --cache-type-k q8_0
    --cache-type-v q8_0
  gpu1-args: >
    --device Vulkan0
    --split-mode none
    --parallel 1
    --gpu-layers all
  gpu2-args: >
    --device Vulkan1
    --split-mode none
    --parallel 1
    --gpu-layers all
  gpu-equal-args: >
    --device Vulkan0,Vulkan1
    --split-mode layer
    --tensor-split 1,1
    --parallel 1
    --gpu-layers all
  gpu-balanced3-args: >
    --device Vulkan0,Vulkan1,Vulkan2
    --split-mode layer
    --tensor-split 24,16,24
    --parallel 1
    --gpu-layers all
  gpu-balanced-args: >
    --device Vulkan0,Vulkan1
    --split-mode row
    --tensor-split 1,1
    -ngl 99
    --parallel 1
    --gpu-layers all
  vision-args: "--image-min-tokens 1024"
  jinja-args: "--jinja"
  flash-off-args: "--flash-attn off"
  nothink-args: >
    --reasoning-budget 0
    --reasoning-format none
  qwen-nothink-args: >
    --reasoning-budget 0
    --reasoning-format none
    --chat-template-kwargs '{"enable_thinking": false}'
  interpret-args: >
    --temp 0
    --top-k 1
    --top-p 1
    --min-p 0
    --seed 42
    --repeat-penalty 1.0
    --presence-penalty 0
    --frequency-penalty 0
    --mirostat 0
    --dynatemp-range 0
    --cache-reuse 128
  coder_args: >
    --jinja
    --flash-attn on
    --temp 0
    --top_p 0.9
    --top-k 20
    --min-p 0.0
    --presence-penalty 0.0
    --repeat-penalty 1.0
    --seed 42
    --frequency-penalty 0
    --mirostat 0
    --dynatemp-range 0
    --cache-reuse 128
  batch-args: >
    --threads 8
    --threads-batch 24
    --batch-size 512
    --ubatch-size 512
    --flash-attn on

models:
  InternVL3-5-GPT-OSS-20B@gpu2:
