# ROCm Prebuilt Binaries Configuration
# This is an alternative to custom Git builds
# Use this to replace the failing Git-based builds with reliable prebuilt binaries
#
# To activate:
# 1. Rename this file to backend-runtime.override.yaml (or merge into existing)
# 2. Commit changes
# 3. Restart services: docker compose down && docker compose up -d

version: 1
defaults:
  source_type: github_release
  repo_owner: ggml-org
  repo_name: llama.cpp
  enabled: true
  always: false
  base_backends:
    - cpu
    - cuda
    - rocm
    - vulkan

profiles:
  # Use prebuilt ROCm 7.2 binaries from ggml-org
  source-rocm-prebuilt:
    source_type: github_release
    repo_owner: ggml-org
    repo_name: llama.cpp
    # Automatically downloads llama-b*-bin-ubuntu-rocm-7.2-x64.tar.gz

  # Fix for ROCm official: use master branch instead of non-existent main
  source-rocm-official-fixed:
    source_type: git
    git_url: https://github.com/ROCm/llama.cpp.git
    git_ref: master  # Fixed: was "main" which doesn't exist

  # ROCm GFX1030/1100 build configuration
  build-rocm-gfx:
    backend: rocm
    configure_command: cmake -S . -B build -DLLAMA_BUILD_SERVER=ON -DGGML_HIPBLAS=ON -DAMDGPU_TARGETS=gfx1030;gfx1100 -DCMAKE_HIP_ARCHITECTURES=gfx1030;gfx1100 -DCMAKE_BUILD_TYPE=Release
    build_command: cmake --build build --config Release --parallel
    binary_glob: build/bin/llama-server
    library_glob: build/bin/*.so*
    apt_packages:
      - git
      - cmake
      - build-essential
      - pkg-config

variants:
  # === PREBUILT ROCM VARIANTS (Recommended) ===
  # These use official prebuilt binaries from ggml-org
  # Fast, reliable, tested

  rocm-7.2-prebuilt:
    # Uses ggml-org prebuilt ROCm 7.2 binary
    backend: rocm
    macro: llama-server-rocm-prebuilt
    runtime_subdir: rocm
    enabled: true  # Enable this

  # === CUSTOM BUILD VARIANTS (Fallback) ===
  # These build from source if prebuilt is not suitable
  # Note: Fix branch references before enabling

  rocm-gfx1100-official-current-fixed:
    # FIXED: Changed branch from "main" (doesn't exist) to "master"
    profiles:
      - source-rocm-official-fixed  # Note: uses fixed branch
      - build-rocm-gfx
    macro: llama-server-rocm-gfx1100-official
    runtime_subdir: rocm/gfx1100/official
    enabled: false  # Keep disabled unless needed

  rocm-gfx1030-official-current-fixed:
    # FIXED: Changed branch from "main" to "master"
    profiles:
      - source-rocm-official-fixed  # Note: uses fixed branch
      - build-rocm-gfx
    macro: llama-server-rocm-gfx1030-official
    runtime_subdir: rocm/gfx1030/official
    enabled: false  # Keep disabled unless needed

  # === COMMENTED OUT - Better to use prebuilt ===
  # rocm-gfx1030-lemonade-main:
  #   Reason: Prebuilt binaries are more reliable
  #   If needed, fix network issues and enable

# === MIGRATION GUIDE ===
#
# Current state:
#   - 4 custom Git builds configured (all failing)
#   - Boot warnings and failures
#   - Slow startup due to build attempts
#
# With prebuilt binaries:
#   - 1 prebuilt ROCm 7.2 binary (fast, reliable)
#   - Fixed Git builds available as fallback
#   - Fast startup (no compilation)
#   - Clean boot logs
#
# To use:
#   1. Replace defaults: source_type: github_release
#   2. Enable rocm-7.2-prebuilt variant
#   3. Disable custom build variants
#   4. Restart services
#
# To revert:
#   1. Use original backend-runtime.base.yaml
#   2. Custom builds still available
#
