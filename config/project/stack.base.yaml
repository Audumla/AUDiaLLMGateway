version: 3

project:
  github:
    owner: Audumla
    repo: AUDiaLLMGateway
    release_asset_strategy: source_archive
  installer:
    state_path: state/install-state.json
    protected_paths:
      - config/local
      - state
      - .runtime
      - .venv
      - .agent_runner
    managed_paths:
      - README.md
      - requirements.txt
      - bootstrap
      - changelog
      - config/env.example
      - config/project
      - docs
      - install
      - scripts
      - specifications
      - src
      - tests
    seed_paths:
      - config/local
  components:
    python_runtime:
      required: true
      default_enabled: true
    gateway_python_deps:
      required: true
      default_enabled: true
    llama_cpp:
      required: true
      default_enabled: true
    llama_swap:
      required: true
      default_enabled: true
    nginx:
      required: false
      default_enabled: false
    models:
      required: false
      default_enabled: false
  component_settings:
    llama_cpp:
      provider: github_release
      repo_owner: ggml-org
      repo_name: llama.cpp
      install_root: tools/llama.cpp
      binary_subdir: bin
      executable_names:
        windows: llama-server.exe
        linux: llama-server
        macos: llama-server
      selected_profile: auto
      default_profiles:
        windows: windows-vulkan
        linux: linux-cpu
        macos: macos-metal
      profiles:
        windows-vulkan:
          platform: windows
          support_tier: first
          backend: vulkan
          version: latest
          asset_match_tokens:
            - win
            - vulkan
            - x64
          sidecar_files: []
        windows-hip:
          platform: windows
          support_tier: first
          backend: hip
          version: latest
          asset_match_tokens:
            - win
            - hip
            - x64
          sidecar_files: []
        windows-cpu:
          platform: windows
          support_tier: first
          backend: cpu
          version: latest
          asset_match_tokens:
            # win-cpu-x64 is the only CPU asset; "win" + "x64" alone would also match vulkan/hip/cuda builds
            - win-cpu-x64
          sidecar_files: []
        linux-vulkan:
          platform: linux
          support_tier: first
          backend: vulkan
          version: latest
          asset_match_tokens:
            # ggml-org names Linux builds as ubuntu-*-x64 regardless of distro
            - ubuntu-vulkan-x64
          sidecar_files: []
        linux-rocm:
          platform: linux
          support_tier: first
          backend: rocm
          version: latest
          asset_match_tokens:
            - ubuntu-rocm
            - x64
          sidecar_files: []
        linux-cuda:
          platform: linux
          support_tier: first
          backend: cuda
          version: latest
          asset_match_tokens:
            # ggml-org releases ship CUDA builds for Windows only; Linux uses ROCm or Vulkan.
            # If a Linux CUDA asset is added later it will use ubuntu-cuda-<ver>-x64.
            - ubuntu-cuda
            - x64
          sidecar_files: []
        linux-cpu:
          platform: linux
          support_tier: first
          backend: cpu
          version: latest
          asset_match_tokens:
            # Match ubuntu-x64.tar.gz (plain CPU) but not ubuntu-vulkan-x64, ubuntu-rocm-x64, etc.
            # Using the compound token ensures no other qualifier sits between ubuntu- and x64.
            - ubuntu-x64
          sidecar_files: []
        macos-metal:
          platform: macos
          support_tier: first
          backend: metal
          version: latest
          asset_match_tokens:
            # macOS builds ship as macos-x64 (Metal is default; no separate metal asset)
            - macos-x64
          sidecar_files: []
        macos-cpu:
          platform: macos
          support_tier: first
          backend: cpu
          version: latest
          asset_match_tokens:
            - macos-x64
          sidecar_files: []
      copy_sidecar_to_binary_dir: true
    llama_swap:
      provider: package_manager
      repo_owner: mostlygeek
      repo_name: llama-swap
      install_root: tools/llama-swap
      version: latest
    nginx:
      provider: package_manager
    models:
      install_root: models

install:
  venv_path: .venv
  python_min_version: "3.11"

network:
  backend_bind_host: 127.0.0.1
  public_host: 127.0.0.1
  services:
    llama_swap:
      host: 127.0.0.1
      port: 41080
    litellm:
      host: 127.0.0.1
      port: 4000
    nginx:
      host: localhost
      port: 8080

llama_swap:
  executable: ${LLAMA_SWAP_EXE}
  project_config_path: config/project/llama-swap.base.yaml
  local_override_path: config/local/llama-swap.override.yaml
  generated_config_path: config/generated/llama-swap/llama-swap.generated.yaml
  health_paths:
    - /health
    - /v1/models
  extra_args: []

litellm:
  executable: litellm
  generated_config_path: config/generated/litellm/litellm.config.yaml
  master_key_env: LITELLM_MASTER_KEY
  health_paths:
    - /health/liveliness
    - /health
    - /v1/models
  extra_args:
    - --detailed_debug

models:
  project_config_path: config/project/models.base.yaml
  local_override_path: config/local/models.override.yaml

routing:
  future_fallbacks:
    local/qwen122_smart:
      - local/qwen27_fast
  notes:
    - llama-swap is the local model backend router.
    - LiteLLM stays in front as the OpenAI-compatible gateway and MCP-facing layer.

mcp:
  enabled: false
  project_config_path: config/project/mcp.base.yaml
  local_override_path: config/local/mcp.override.yaml
  generated_client_path: config/generated/mcp/litellm.mcp.client.json
  gateway_server_name: litellm-gateway

reverse_proxy:
  nginx:
    enabled: false
    config_path: config/generated/nginx/nginx.conf

systemd:
  enabled: true
  service_name: audia-gateway
  user: ""
  group: ""
  description: "AUDia LLM Gateway"
  after: network.target
  restart: always
