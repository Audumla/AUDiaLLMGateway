version: 3

project:
  github:
    owner: ExampleOrg
    repo: AUDiaLLMGateway
    release_asset_strategy: source_archive
  installer:
    state_path: state/install-state.json
    protected_paths:
      - config/local
      - state
      - .runtime
      - .venv
      - .agent_runner
    managed_paths:
      - README.md
      - requirements.txt
      - bootstrap
      - changelog
      - config/env.example
      - config/project
      - docs
      - install
      - scripts
      - specifications
      - src
      - tests
    seed_paths:
      - config/local
  components:
    python_runtime:
      required: true
      default_enabled: true
    gateway_python_deps:
      required: true
      default_enabled: true
    llama_cpp:
      required: true
      default_enabled: true
    llama_swap:
      required: true
      default_enabled: true
    nginx:
      required: false
      default_enabled: false
    firewall:
      required: false
      default_enabled: false
    vllm:
      required: false
      default_enabled: false
    models:
      required: false
      default_enabled: false
  component_settings:
    llama_cpp:
      provider: github_release
      repo_owner: ggml-org
      repo_name: llama.cpp
      install_root: tools/llama.cpp
      binary_subdir: bin
      executable_names:
        windows: llama-server.exe
        linux: llama-server
        macos: llama-server
      selected_profile: auto
      default_profiles:
        windows: windows-vulkan
        linux:
          - linux-cpu
          - linux-vulkan
          - linux-rocm
          - linux-cuda
        macos: macos-metal
      profiles:
        windows-vulkan:
          platform: windows
          support_tier: first
          backend: vulkan
          version: latest
          asset_match_tokens:
            - win
            - vulkan
            - x64
          sidecar_files: []
        windows-vulkan-turboquant:
          platform: windows
          support_tier: experimental
          backend: vulkan
          source_type: git
          required_toolchains:
            - vulkan_sdk
          requires_vulkan_sdk: true
          vulkan_sdk_root: toolchains/vulkan-sdk/windows
          git_url: https://github.com/TheTom/llama-cpp-turboquant.git
          git_ref: feature/turboquant-kv-cache
          git_commit: 8590cbff961dbaf1d3a9793fd11d402e248869b9
          version: 8590cbff961dbaf1d3a9793fd11d402e248869b9
          configure_command: cmake -S . -B build -DLLAMA_BUILD_SERVER=ON -DGGML_VULKAN=ON -DCMAKE_BUILD_TYPE=Release
          build_command: cmake --build build --config Release --parallel
          binary_glob: build/**/llama-server.exe
          library_glob:
            - build/**/*.dll
            - build/**/vulkan-*.json
          sidecar_files: []
        windows-hip:
          platform: windows
          support_tier: first
          backend: hip
          version: latest
          asset_match_tokens:
            - win
            - hip
            - x64
          sidecar_files: []
        windows-cuda:
          platform: windows
          support_tier: first
          backend: cuda
          version: latest
          asset_match_tokens:
            - win
            - cuda
            - x64
          sidecar_files: []
        windows-sycl:
          platform: windows
          support_tier: second
          backend: sycl
          version: latest
          asset_match_tokens:
            - win
            - sycl
            - x64
          sidecar_files: []
        windows-rpc:
          platform: windows
          support_tier: second
          backend: rpc
          version: latest
          asset_match_tokens:
            - win
            - rpc
            - x64
          sidecar_files: []
        windows-cpu:
          platform: windows
          support_tier: first
          backend: cpu
          version: latest
          asset_match_tokens:
            # win-cpu-x64 is the only CPU asset; "win" + "x64" alone would also match vulkan/hip/cuda builds
            - win-cpu-x64
          sidecar_files: []
        linux-vulkan:
          platform: linux
          support_tier: first
          backend: vulkan
          version: latest
          asset_match_tokens:
            # ggml-org names Linux builds as ubuntu-*-x64 regardless of distro
            - ubuntu-vulkan-x64
