version: 1
title: AUDia backend compatibility matrix
reference_model:
  hf: Qwen/Qwen3.5-4B
  gguf: Qwen3.5-4B-Q5_K_XL.gguf

backends:
  llamacpp_rocm72_prebuilt:
    status: working
    notes:
      - qwen3.5-27B prebuilt ROCm lane validated on `qwen3.5-27b-(96k-Q6)-rocm-latest`
      - benchmark result: 9.98 tok/s
      - backed by ggml prebuilt `llama-b8583-bin-ubuntu-rocm-7.2-x64.tar.gz`
  llamacpp_rocm721_local_build:
    status: working
    notes:
      - qwen3.5-27B local source fallback built in `rocm/dev-ubuntu-24.04:7.2.1`
      - benchmark result: 21.49 tok/s
      - first local attempt failed as CPU-only until `GGML_HIP=ON` was enabled
      - runtime required `hipblas-dev`, `rocblas-dev`, and `hipblaslt-dev`
  llamacpp_rocm_lemonade_b1224:
    status: working
    notes:
      - lemonade-sdk release b1224 `gfx110X` prebuilt validated on qwen27
      - benchmark result: 21.85 tok/s
      - required host package `libatomic1` on openSUSE prior to startup
  llamacpp_rocm_lychee_strix_halo:
    status: architecture_scoped
    notes:
      - prebuilt lane observed at
        Lychee-Technology/llama-cpp-for-strix-halo release b8580
      - published prebuilt targets gfx1151 (Strix Halo)
      - current benchmark host is gfx1100 (dual RX 7900 XTX), so this lane
        is tracked separately from currently validated host lanes
      - use source-build fallback for gfx1100 and record results as a dedicated
        engine/backend lane when validated
      - current gfx1100 run reached dependency fixes but then failed with
        Illegal instruction
  llamacpp_vulkan:
    status: working
    notes:
      - best single-user interactive path on the two RX 7900 XTX cards
      - measured against the shared Qwen3.5-4B compare model
  llamacpp_rocm_preview:
    status: working
    notes:
      - best ROCm fallback currently confirmed
      - measured against the shared Qwen3.5-4B compare model
  vllm_awq:
    status: working
    notes:
      - worked on Qwen3-0.6B historically
      - current live host again serves Qwen3-0.6B once AUDIA_ENABLE_VLLM=true is set
      - Qwen3.5-4B compare run still needs further triage
      - qwen3.5-27B AWQ on the live ROCm image now fails during warm-up with a causal_conv1d_update assertion
  vllm_bf16:
    status: working
    notes:
      - worked on Qwen3-0.6B historically
      - current live host again serves Qwen3-0.6B once AUDIA_ENABLE_VLLM=true is set
      - Qwen3.5-4B compare run still needs further triage
      - qwen3.5-27B BF16 still fails with HIP OOM / engine-core failure
      - v0.18.0 image run for Qwen3.5-4B also failed on engine init with HIP OOM
  vllm_rocm0171_rollback:
    status: working
    notes:
      - "rollback lane uses vllm/vllm-openai-rocm:latest at v0.17.1"
      - "Qwen3.5-27B AWQ on the dual 7900 XTX cards successfully started with max_model_len=2048, max_num_batched_tokens=2048, and --language-model-only"
      - "/v1/models responded and /v1/chat/completions returned a chat completion on the clean 2048-token run"
      - "standard compare prompt benchmark: 3.41 tok/s over 300 completion tokens"
      - "keep this lane separate from the v0.18.x hybrid KV-cache regression"
  vllm_rocm721_wheel_nightly:
    status: working_on_small_models
    notes:
      - "Installed using the documented ROCm nightly wheel lane from vLLM docs: https://wheels.vllm.ai/rocm/nightly/${VLLM_ROCM_VARIANT}"
      - Build completed as `local/vllm-rocm721-wheel:nightly`
      - Qwen3-0.6B served successfully at 75.05 eval tok/s
      - Qwen3.5-4B still failed during engine startup with HIP OOM in the
        multimodal attention path
      - Qwen3.5-4B text-only follow-up on the correct snapshot now gets past
        multimodal profiling, but still fails on KV-cache page-size
        unification
      - Qwen3.5-27B text-only follow-up at 2096 tokens also fails with the same
        KV-cache page-size unification error
      - This lane remains valid for small-model smoke tests, but Qwen3.5 family
        text-only serving still needs an upstream engine fix before it can be
        treated as a large-model path
  ollama_rocm:
    status: working
    notes:
      - usable once the model is created inside the container
      - measured against the shared Qwen3.5-4B compare model
      - qwen3.5-27B Q6_K benchmarked successfully at 18.12 tok/s on qwen27b
  tgi_rocm:
    status: blocked
    notes:
      - latest-rocm and 3.3.4-rocm both fail on the current gfx1100 host
      - explicit 3.3.7-rocm tag lookup failed (tag not found)
      - Qwen3.5-4B fails with Unsupported model type qwen3_5
      - Qwen2.5-0.5B-Instruct fails later with HIP invalid device function
  sglang_rocm:
    status: blocked
    notes:
      - current Qwen3.5-4B compare run exits before readiness
      - official ROCm images are MI300-targeted
      - gfx1100 startup still fails
  aphrodite:
    status: blocked
    notes:
      - current Qwen3.5-4B compare run exits before readiness
      - current image requires libcuda.so.1
  zinc:
    status: working
    notes:
      - source-built and test-passed on the live server
      - runtime check reaches READY WITH WARNINGS after staging shader assets
      - Vulkan-native AMD path, treated as a separate lane from ROCm
      - qwen3.5-27B Q6_K currently crashes in libvulkan_radeon.so on both RX 7900 XTX cards
